<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финальный тест Supabase - Tarot App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #51cf66, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .success-alert {
            background: rgba(81, 207, 102, 0.2);
            border: 2px solid #51cf66;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .test-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid #4ecdc4;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #4ecdc4;
            display: flex;
            align-items: center;
        }

        .section-icon {
            margin-right: 10px;
            font-size: 1.4rem;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            text-align: center;
            font-size: 14px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        .btn.success {
            background: linear-gradient(135deg, #51cf66, #40c057);
        }

        .btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn.warning {
            background: linear-gradient(135deg, #ffd43b, #fab005);
            color: #1a1a2e;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 5px;
            color: #b0b0b0;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
        }

        .result-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            border-left: 4px solid #4ecdc4;
        }

        .result-panel.success {
            border-left-color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
        }

        .result-panel.error {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-timestamp {
            color: #868e96;
            margin-right: 10px;
        }

        .log-success { color: #51cf66; }
        .log-error { color: #ff6b6b; }
        .log-warning { color: #ffd43b; }
        .log-info { color: #74c0fc; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #51cf66);
            width: 0%;
            transition: width 0.5s ease;
        }

        .hidden { display: none; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .data-table th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✅ Финальный тест</h1>
            <p>Проверим, что RLS политики работают и данные сохраняются</p>
        </div>

        <div class="success-alert">
            <h3 style="color: #51cf66; margin-bottom: 10px;">🎉 Политики RLS созданы!</h3>
            <p>Ошибка "already exists" означает, что политики успешно применены. Теперь проверим их работу.</p>
        </div>

        <div class="test-section">
            <div class="section-title">
                <span class="section-icon">🔑</span>
                Подключение к Supabase
            </div>
            <div class="input-group">
                <label class="input-label">Supabase URL:</label>
                <input type="text" class="input-field" id="supabaseUrl" value="https://jjowuzqfnwcuulcknkxh.supabase.co" readonly>
            </div>
            <div class="input-group">
                <label class="input-label">Anon Key:</label>
                <input type="password" class="input-field" id="supabaseKey" placeholder="Введите ваш anon key">
            </div>
        </div>

        <div class="test-section">
            <div class="section-title">
                <span class="section-icon">🧪</span>
                Тестирование функций приложения
            </div>
            
            <div class="controls">
                <button class="btn" id="testUserCreation">👤 Создать пользователя</button>
                <button class="btn" id="testDailyCard">🃏 Сохранить карту дня</button>
                <button class="btn" id="testQuestion">❓ Сохранить вопрос</button>
                <button class="btn" id="testReview">⭐ Сохранить отзыв</button>
            </div>

            <div class="controls">
                <button class="btn success" id="runAllTests">🚀 Запустить все тесты</button>
                <button class="btn primary" id="viewData">📊 Посмотреть данные</button>
                <button class="btn warning" id="clearTestData">🗑️ Очистить тест-данные</button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="log-container" id="logContainer"></div>

        <div class="result-panel hidden" id="resultPanel">
            <h4 id="resultTitle">Результаты</h4>
            <div id="resultContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;
        let testUserId = null;

        // Система логирования
        const logger = {
            log(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                logEntry.innerHTML = `
                    <span class="log-timestamp">[${timestamp}]</span>
                    <span class="log-${type}">${message}</span>
                `;
                document.getElementById('logContainer').appendChild(logEntry);
                document.getElementById('logContainer').scrollTop = document.getElementById('logContainer').scrollHeight;
            },
            
            success(message) { this.log(`✅ ${message}`, 'success'); },
            error(message) { this.log(`❌ ${message}`, 'error'); },
            warning(message) { this.log(`⚠️ ${message}`, 'warning'); },
            info(message) { this.log(`ℹ️ ${message}`, 'info'); }
        };

        // Обновление прогресса
        function updateProgress(percentage) {
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        // Показать результат
        function showResult(title, content, type = 'success') {
            const panel = document.getElementById('resultPanel');
            const titleEl = document.getElementById('resultTitle');
            const contentEl = document.getElementById('resultContent');

            panel.className = `result-panel ${type}`;
            panel.classList.remove('hidden');
            titleEl.textContent = title;
            contentEl.innerHTML = content;
        }

        // Инициализация Supabase
        async function initSupabase() {
            const url = document.getElementById('supabaseUrl').value;
            const key = document.getElementById('supabaseKey').value;

            if (!key) {
                logger.error('Введите Anon Key');
                return false;
            }

            try {
                supabaseClient = window.supabase.createClient(url, key, {
                    auth: {
                        persistSession: false,
                        autoRefreshToken: false
                    }
                });

                // Тест подключения
                const { error } = await supabaseClient
                    .from('tarot_user_profiles')
                    .select('count')
                    .limit(1);

                if (error && error.code !== 'PGRST116') {
                    throw error;
                }

                logger.success('Supabase подключен');
                return true;

            } catch (error) {
                logger.error(`Ошибка подключения: ${error.message}`);
                return false;
            }
        }

        // Тест 1: Создание пользователя
        async function testUserCreation() {
            if (!supabaseClient && !await initSupabase()) return false;

            logger.info('Тест создания пользователя...');
            
            try {
                testUserId = `test_${Date.now()}`;
                
                const { data, error } = await supabaseClient
                    .from('tarot_user_profiles')
                    .insert([{
                        telegram_id: testUserId,
                        username: 'Test User',
                        is_subscribed: false,
                        questions_used: 0,
                        free_predictions_left: 3
                    }])
                    .select()
                    .single();

                if (error) {
                    logger.error(`Ошибка создания пользователя: ${error.message}`);
                    return false;
                }

                logger.success(`Пользователь создан с ID: ${data.id}`);
                return data;

            } catch (error) {
                logger.error(`Критическая ошибка: ${error.message}`);
                return false;
            }
        }

        // Тест 2: Карта дня
        async function testDailyCard() {
            if (!testUserId) {
                logger.warning('Сначала создайте пользователя');
                return false;
            }

            logger.info('Тест сохранения карты дня...');

            try {
                const { data, error } = await supabaseClient
                    .from('tarot_daily_cards')
                    .insert([{
                        user_id: testUserId,
                        card_date: new Date().toISOString().split('T')[0],
                        card_data: {
                            name: 'Звезда',
                            description: 'Тестовая карта дня'
                        },
                        ai_prediction: 'Тестовое предсказание для карты дня'
                    }])
                    .select()
                    .single();

                if (error) {
                    logger.error(`Ошибка сохранения карты дня: ${error.message}`);
                    return false;
                }

                logger.success(`Карта дня сохранена с ID: ${data.id}`);
                return data;

            } catch (error) {
                logger.error(`Критическая ошибка: ${error.message}`);
                return false;
            }
        }

        // Тест 3: Вопрос и ответ
        async function testQuestion() {
            if (!testUserId) {
                logger.warning('Сначала создайте пользователя');
                return false;
            }

            logger.info('Тест сохранения вопроса и ответа...');

            try {
                // Сначала сохраняем вопрос
                const { data: question, error: questionError } = await supabaseClient
                    .from('tarot_questions')
                    .insert([{
                        user_id: testUserId,
                        question_text: 'Тестовый вопрос для проверки сохранения'
                    }])
                    .select()
                    .single();

                if (questionError) {
                    logger.error(`Ошибка сохранения вопроса: ${questionError.message}`);
                    return false;
                }

                logger.success(`Вопрос сохранен с ID: ${question.id}`);

                // Затем сохраняем ответ
                const { data: answer, error: answerError } = await supabaseClient
                    .from('tarot_answers')
                    .insert([{
                        question_id: question.id,
                        card_id: 'test_card',
                        card_name: 'Тестовая карта',
                        interpretation: 'Тестовый ответ на вопрос',
                        cards_drawn: [{
                            name: 'Тестовая карта',
                            description: 'Описание тестовой карты'
                        }],
                        ai_prediction: 'Тестовое предсказание ИИ',
                        spread_type: 'single_card'
                    }])
                    .select()
                    .single();

                if (answerError) {
                    logger.error(`Ошибка сохранения ответа: ${answerError.message}`);
                    return false;
                }

                logger.success(`Ответ сохранен с ID: ${answer.id}`);
                return { question, answer };

            } catch (error) {
                logger.error(`Критическая ошибка: ${error.message}`);
                return false;
            }
        }

        // Тест 4: Отзыв
        async function testReview() {
            if (!testUserId) {
                logger.warning('Сначала создайте пользователя');
                return false;
            }

            logger.info('Тест сохранения отзыва...');

            try {
                const { data, error } = await supabaseClient
                    .from('tarot_reviews')
                    .insert([{
                        user_id: testUserId,
                        rating: 5,
                        review_text: 'Отличное приложение для Таро! Тестовый отзыв.',
                        username: 'Test User',
                        is_approved: true
                    }])
                    .select()
                    .single();

                if (error) {
                    logger.error(`Ошибка сохранения отзыва: ${error.message}`);
                    return false;
                }

                logger.success(`Отзыв сохранен с ID: ${data.id}`);
                return data;

            } catch (error) {
                logger.error(`Критическая ошибка: ${error.message}`);
                return false;
            }
        }

        // Просмотр данных
        async function viewData() {
            if (!supabaseClient && !await initSupabase()) return false;

            logger.info('Получение данных из таблиц...');

            try {
                const tables = [
                    { name: 'tarot_user_profiles', display: 'Пользователи' },
                    { name: 'tarot_daily_cards', display: 'Карты дня' },
                    { name: 'tarot_questions', display: 'Вопросы' },
                    { name: 'tarot_answers', display: 'Ответы' },
                    { name: 'tarot_reviews', display: 'Отзывы' }
                ];

                let resultHtml = '<h5>📊 Данные в таблицах:</h5><br>';

                for (const table of tables) {
                    const { data, error } = await supabaseClient
                        .from(table.name)
                        .select('*')
                        .limit(5);

                    if (error) {
                        resultHtml += `<strong>${table.display}:</strong> Ошибка - ${error.message}<br>`;
                    } else {
                        resultHtml += `<strong>${table.display}:</strong> ${data.length} записей<br>`;
                        
                        if (data.length > 0) {
                            resultHtml += `<small>Последняя запись: ${JSON.stringify(data[0], null, 2).substring(0, 100)}...</small><br>`;
                        }
                    }
                    resultHtml += '<br>';
                }

                showResult('Данные в базе', resultHtml, 'success');

            } catch (error) {
                logger.error(`Ошибка получения данных: ${error.message}`);
            }
        }

        // Очистка тестовых данных
        async function clearTestData() {
            if (!supabaseClient) return;

            logger.info('Очистка тестовых данных...');

            try {
                // Удаляем все записи с test_ префиксом
                const tables = ['tarot_reviews', 'tarot_answers', 'tarot_questions', 'tarot_daily_cards', 'tarot_user_profiles'];

                for (const table of tables) {
                    if (table === 'tarot_user_profiles') {
                        await supabaseClient
                            .from(table)
                            .delete()
                            .like('telegram_id', 'test_%');
                    } else if (table === 'tarot_answers') {
                        await supabaseClient
                            .from(table)
                            .delete()
                            .eq('card_id', 'test_card');
                    } else {
                        await supabaseClient
                            .from(table)
                            .delete()
                            .like('user_id', 'test_%');
                    }
                }

                logger.success('Тестовые данные очищены');
                testUserId = null;

            } catch (error) {
                logger.error(`Ошибка очистки: ${error.message}`);
            }
        }

        // Запуск всех тестов
        async function runAllTests() {
            logger.info('🚀 Запуск всех тестов...');
            updateProgress(0);

            const tests = [
                { name: 'Создание пользователя', fn: testUserCreation },
                { name: 'Карта дня', fn: testDailyCard },
                { name: 'Вопрос и ответ', fn: testQuestion },
                { name: 'Отзыв', fn: testReview }
            ];

            let successCount = 0;
            const results = [];

            for (let i = 0; i < tests.length; i++) {
                const test = tests[i];
                logger.info(`--- Тест ${i + 1}/4: ${test.name} ---`);

                try {
                    const result = await test.fn();
                    if (result) {
                        successCount++;
                        results.push({ name: test.name, success: true });
                    } else {
                        results.push({ name: test.name, success: false });
                    }
                } catch (error) {
                    logger.error(`Тест "${test.name}" завершился с ошибкой: ${error.message}`);
                    results.push({ name: test.name, success: false, error: error.message });
                }

                updateProgress(((i + 1) / tests.length) * 100);
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            // Результаты
            let resultHtml = `<strong>Результат: ${successCount}/${tests.length} тестов пройдено</strong><br><br>`;
            
            results.forEach(result => {
                const icon = result.success ? '✅' : '❌';
                resultHtml += `${icon} ${result.name}<br>`;
            });

            if (successCount === tests.length) {
                resultHtml += '<br><strong style="color: #51cf66;">🎉 Все тесты пройдены! Supabase работает корректно!</strong>';
                resultHtml += '<br><br>Теперь ваше приложение должно корректно сохранять все данные.';
            } else {
                resultHtml += '<br><strong style="color: #ff6b6b;">⚠️ Некоторые тесты не прошли</strong>';
                resultHtml += '<br>Проверьте логи выше для диагностики проблем.';
            }

            showResult('Результаты тестирования', resultHtml, successCount === tests.length ? 'success' : 'error');
        }

        // Обработчики событий
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('testUserCreation').addEventListener('click', testUserCreation);
            document.getElementById('testDailyCard').addEventListener('click', testDailyCard);
            document.getElementById('testQuestion').addEventListener('click', testQuestion);
            document.getElementById('testReview').addEventListener('click', testReview);
            document.getElementById('runAllTests').addEventListener('click', runAllTests);
            document.getElementById('viewData').addEventListener('click', viewData);
            document.getElementById('clearTestData').addEventListener('click', clearTestData);

            logger.info('Финальный тест готов к работе');
            logger.info('Введите ваш Supabase Anon Key и запустите тесты');
        });

        // Экспорт для консоли
        window.FinalTest = {
            runAllTests,
            viewData,
            clearTestData,
            testUserCreation,
            testDailyCard,
            testQuestion,
            testReview
        };
    </script>
</body>
</html>
