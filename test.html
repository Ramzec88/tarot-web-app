<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диагностика Supabase - Tarot App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .alert {
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid #ff6b6b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .alert-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .diagnostic-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid #4ecdc4;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #4ecdc4;
            display: flex;
            align-items: center;
        }

        .section-icon {
            margin-right: 10px;
            font-size: 1.4rem;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        .btn.danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn.success {
            background: linear-gradient(135deg, #51cf66, #40c057);
        }

        .btn.warning {
            background: linear-gradient(135deg, #ffd43b, #fab005);
            color: #1a1a2e;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #4ecdc4;
        }

        .result-panel.error {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .result-panel.success {
            border-left-color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
        }

        .result-panel.warning {
            border-left-color: #ffd43b;
            background: rgba(255, 212, 59, 0.1);
        }

        .code-block {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            margin: 15px 0;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: pre-wrap;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #666;
        }

        .status-card.success {
            border-left-color: #51cf66;
        }

        .status-card.error {
            border-left-color: #ff6b6b;
        }

        .status-card.warning {
            border-left-color: #ffd43b;
        }

        .status-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .status-value {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: flex-start;
        }

        .log-timestamp {
            color: #868e96;
            margin-right: 10px;
            min-width: 80px;
        }

        .log-success { color: #51cf66; }
        .log-error { color: #ff6b6b; }
        .log-warning { color: #ffd43b; }
        .log-info { color: #74c0fc; }

        .hidden { display: none; }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 5px;
            color: #b0b0b0;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
        }

        .input-field::placeholder {
            color: #888;
        }

        @media (max-width: 768px) {
            .container { 
                padding: 20px; 
                margin: 10px;
            }
            .controls { 
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Диагностика Supabase</h1>
            <p>Найдем и исправим проблемы с сохранением данных</p>
        </div>

        <div class="alert">
            <div class="alert-title">🚨 Проблема обнаружена</div>
            <p>Данные не сохраняются в таблицы Supabase. Запустим полную диагностику для выявления причин.</p>
        </div>

        <div class="diagnostic-section">
            <div class="section-title">
                <span class="section-icon">🔑</span>
                Настройка подключения
            </div>
            <div class="input-group">
                <label class="input-label">Supabase URL:</label>
                <input type="text" class="input-field" id="supabaseUrl" value="https://jjowuzqfnwcuulcknkxh.supabase.co" readonly>
            </div>
            <div class="input-group">
                <label class="input-label">Anon Key (введите ваш ключ):</label>
                <input type="password" class="input-field" id="supabaseKey" placeholder="Введите ваш anon key">
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="testConnection">🔗 Тест подключения</button>
            <button class="btn warning" id="checkTables">📋 Проверить таблицы</button>
            <button class="btn success" id="testInsert">💾 Тест записи</button>
            <button class="btn danger" id="checkRLS">🔒 Проверить RLS</button>
            <button class="btn" id="runFullDiagnostic">🚀 Полная диагностика</button>
            <button class="btn" id="clearLogs">🗑️ Очистить логи</button>
        </div>

        <div class="status-grid" id="statusGrid"></div>

        <div class="log-container" id="logContainer"></div>

        <div class="result-panel hidden" id="solutionPanel">
            <h4>💡 Рекомендуемые решения</h4>
            <div id="solutionContent"></div>
        </div>
    </div>

    <script>
        let supabaseClient = null;

        // Система логирования
        const logger = {
            log(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                logEntry.innerHTML = `
                    <span class="log-timestamp">[${timestamp}]</span>
                    <span class="log-${type}">${message}</span>
                `;
                document.getElementById('logContainer').appendChild(logEntry);
                document.getElementById('logContainer').scrollTop = document.getElementById('logContainer').scrollHeight;
                console.log(`[${timestamp}] ${message}`);
            },
            
            success(message) { this.log(`✅ ${message}`, 'success'); },
            error(message) { this.log(`❌ ${message}`, 'error'); },
            warning(message) { this.log(`⚠️ ${message}`, 'warning'); },
            info(message) { this.log(`ℹ️ ${message}`, 'info'); }
        };

        // Создание карточки статуса
        function createStatusCard(title, value, status = 'info') {
            const card = document.createElement('div');
            card.className = `status-card ${status}`;
            card.innerHTML = `
                <div class="status-title">${title}</div>
                <div class="status-value">${value}</div>
            `;
            return card;
        }

        // Обновление статуса
        function updateStatus() {
            const grid = document.getElementById('statusGrid');
            grid.innerHTML = '';

            const url = document.getElementById('supabaseUrl').value;
            const key = document.getElementById('supabaseKey').value;
            
            grid.appendChild(createStatusCard(
                '🔗 Подключение',
                supabaseClient ? 'Инициализировано' : 'Не подключено',
                supabaseClient ? 'success' : 'error'
            ));

            grid.appendChild(createStatusCard(
                '🔑 Конфигурация',
                key ? 'API ключ введен' : 'API ключ не введен',
                key ? 'success' : 'warning'
            ));

            grid.appendChild(createStatusCard(
                '📊 URL',
                url || 'Не задан',
                url ? 'success' : 'error'
            ));
        }

        // Загрузка Supabase SDK
        async function loadSupabaseSDK() {
            if (window.supabase) return true;

            logger.info('Загрузка Supabase SDK...');
            
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
                script.onload = () => {
                    logger.success('Supabase SDK загружен');
                    resolve(true);
                };
                script.onerror = () => {
                    logger.error('Не удалось загрузить Supabase SDK');
                    reject(false);
                };
                document.head.appendChild(script);
            });
        }

        // Инициализация Supabase клиента
        async function initializeSupabase() {
            const url = document.getElementById('supabaseUrl').value;
            const key = document.getElementById('supabaseKey').value;

            if (!url || !key) {
                logger.error('URL или API ключ не заданы');
                return false;
            }

            try {
                await loadSupabaseSDK();
                
                supabaseClient = window.supabase.createClient(url, key, {
                    auth: {
                        persistSession: false,
                        autoRefreshToken: false,
                        detectSessionInUrl: false
                    },
                    db: {
                        schema: 'public'
                    },
                    global: {
                        headers: {
                            'x-application': 'tarot-diagnostic'
                        }
                    }
                });

                logger.success('Supabase клиент инициализирован');
                updateStatus();
                return true;

            } catch (error) {
                logger.error(`Ошибка инициализации: ${error.message}`);
                return false;
            }
        }

        // Тест подключения
        async function testConnection() {
            if (!await initializeSupabase()) return false;

            logger.info('Тестирование подключения...');

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const { data, error } = await supabaseClient
                    .from('tarot_user_profiles')
                    .select('count', { count: 'exact', head: true })
                    .abortSignal(controller.signal);

                clearTimeout(timeoutId);

                if (error) {
                    logger.error(`Ошибка подключения: ${error.message}`);
                    logger.info(`Код ошибки: ${error.code}`);
                    logger.info(`Детали: ${error.details || 'нет'}`);
                    return false;
                }

                logger.success('Подключение успешно');
                logger.info(`Найдено записей: ${data || 'неизвестно'}`);
                updateStatus();
                return true;

            } catch (error) {
                if (error.name === 'AbortError') {
                    logger.error('Таймаут подключения (более 10 секунд)');
                } else {
                    logger.error(`Критическая ошибка подключения: ${error.message}`);
                }
                return false;
            }
        }

        // Проверка структуры таблиц
        async function checkTables() {
            if (!supabaseClient) {
                logger.warning('Сначала выполните тест подключения');
                return false;
            }

            const tables = [
                'tarot_user_profiles',
                'tarot_daily_cards', 
                'tarot_questions',
                'tarot_answers',
                'tarot_reviews'
            ];

            logger.info('Проверка структуры таблиц...');

            for (const tableName of tables) {
                try {
                    logger.info(`Проверяем таблицу: ${tableName}`);

                    const { data, error } = await supabaseClient
                        .from(tableName)
                        .select('*')
                        .limit(1);

                    if (error) {
                        logger.error(`Таблица ${tableName}: ${error.message}`);
                        
                        if (error.code === '42P01') {
                            logger.warning(`Таблица ${tableName} не существует!`);
                        } else if (error.code === '42501') {
                            logger.warning(`Нет прав доступа к таблице ${tableName}`);
                        }
                    } else {
                        logger.success(`Таблица ${tableName}: доступна`);
                        
                        if (data && data.length > 0) {
                            const columns = Object.keys(data[0]);
                            logger.info(`Колонки: ${columns.join(', ')}`);
                        } else {
                            logger.info('Таблица пуста');
                        }
                    }

                } catch (error) {
                    logger.error(`Критическая ошибка при проверке ${tableName}: ${error.message}`);
                }

                // Небольшая пауза между запросами
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            return true;
        }

        // Тест записи данных
        async function testInsert() {
            if (!supabaseClient) {
                logger.warning('Сначала выполните тест подключения');
                return false;
            }

            logger.info('Тестирование записи данных...');

            try {
                // Генерируем уникальный test ID
                const testId = `test_${Date.now()}`;
                
                logger.info(`Попытка записи тестового пользователя с telegram_id: ${testId}`);

                // Пытаемся записать тестового пользователя
                const { data, error } = await supabaseClient
                    .from('tarot_user_profiles')
                    .insert([
                        {
                            telegram_id: testId,
                            username: 'test_diagnostic',
                            is_subscribed: false,
                            questions_used: 0,
                            free_predictions_left: 3
                        }
                    ])
                    .select();

                if (error) {
                    logger.error(`Ошибка записи: ${error.message}`);
                    logger.info(`Код ошибки: ${error.code}`);
                    logger.info(`Детали: ${error.details || 'нет'}`);
                    
                    // Специфические ошибки
                    if (error.code === '23505') {
                        logger.warning('Конфликт уникальности - возможно, пользователь уже существует');
                    } else if (error.code === '42501') {
                        logger.error('Нет прав на запись - проверьте RLS политики!');
                    } else if (error.code === '23502') {
                        logger.error('Нарушение NOT NULL ограничения');
                    }
                    
                    return false;
                }

                logger.success('Тестовая запись успешна!');
                logger.info(`Записан пользователь с ID: ${data[0]?.id}`);

                // Очищаем тестовые данные
                await supabaseClient
                    .from('tarot_user_profiles')
                    .delete()
                    .eq('telegram_id', testId);

                logger.info('Тестовые данные очищены');
                return true;

            } catch (error) {
                logger.error(`Критическая ошибка записи: ${error.message}`);
                return false;
            }
        }

        // Проверка RLS политик
        async function checkRLS() {
            if (!supabaseClient) {
                logger.warning('Сначала выполните тест подключения');
                return false;
            }

            logger.info('Проверка RLS политик...');

            try {
                // Проверяем анонимный доступ к каждой таблице
                const tables = ['tarot_user_profiles', 'tarot_daily_cards', 'tarot_questions', 'tarot_answers', 'tarot_reviews'];

                for (const tableName of tables) {
                    logger.info(`Проверяем RLS для таблицы: ${tableName}`);

                    try {
                        // Попытка чтения
                        const { data: readData, error: readError } = await supabaseClient
                            .from(tableName)
                            .select('*')
                            .limit(1);

                        if (readError) {
                            if (readError.code === '42501') {
                                logger.error(`${tableName}: RLS блокирует чтение для анонимных пользователей`);
                            } else {
                                logger.warning(`${tableName}: Ошибка чтения - ${readError.message}`);
                            }
                        } else {
                            logger.success(`${tableName}: Чтение разрешено`);
                        }

                        // Попытка записи (только для основной таблицы)
                        if (tableName === 'tarot_user_profiles') {
                            const testId = `rls_test_${Date.now()}`;
                            
                            const { error: insertError } = await supabaseClient
                                .from(tableName)
                                .insert([{
                                    telegram_id: testId,
                                    username: 'rls_test'
                                }]);

                            if (insertError) {
                                if (insertError.code === '42501') {
                                    logger.error(`${tableName}: RLS блокирует запись для анонимных пользователей`);
                                } else {
                                    logger.warning(`${tableName}: Ошибка записи - ${insertError.message}`);
                                }
                            } else {
                                logger.success(`${tableName}: Запись разрешена`);
                                
                                // Очищаем тестовые данные
                                await supabaseClient
                                    .from(tableName)
                                    .delete()
                                    .eq('telegram_id', testId);
                            }
                        }

                    } catch (error) {
                        logger.error(`Критическая ошибка проверки RLS для ${tableName}: ${error.message}`);
                    }

                    await new Promise(resolve => setTimeout(resolve, 500));
                }

            } catch (error) {
                logger.error(`Критическая ошибка проверки RLS: ${error.message}`);
            }
        }

        // Полная диагностика
        async function runFullDiagnostic() {
            logger.info('🚀 Запуск полной диагностики...');
            
            const results = {
                connection: false,
                tables: false,
                insert: false,
                rls: false
            };

            // Шаг 1: Подключение
            logger.info('--- Шаг 1: Тест подключения ---');
            results.connection = await testConnection();

            if (!results.connection) {
                showSolution('Проблема с подключением', [
                    'Проверьте правильность Supabase URL',
                    'Убедитесь, что API ключ введен корректно',
                    'Проверьте интернет соединение',
                    'Убедитесь, что Supabase проект активен'
                ]);
                return;
            }

            // Шаг 2: Таблицы
            logger.info('--- Шаг 2: Проверка таблиц ---');
            results.tables = await checkTables();

            // Шаг 3: Тест записи
            logger.info('--- Шаг 3: Тест записи ---');
            results.insert = await testInsert();

            // Шаг 4: RLS политики
            logger.info('--- Шаг 4: Проверка RLS ---');
            await checkRLS();

            // Анализ результатов
            logger.info('--- Анализ результатов ---');
            
            const successCount = Object.values(results).filter(Boolean).length;
            logger.info(`Успешно: ${successCount}/4 тестов`);

            if (successCount === 4) {
                logger.success('🎉 Все тесты пройдены! Supabase настроен корректно.');
            } else {
                logger.warning('⚠️ Обнаружены проблемы, см. рекомендации ниже');
                
                const issues = [];
                if (!results.connection) issues.push('Проблема подключения');
                if (!results.tables) issues.push('Проблемы с таблицами');
                if (!results.insert) issues.push('Проблемы с записью данных');
                
                showSolution('Обнаружены проблемы', issues);
            }
        }

        // Показать решения
        function showSolution(title, solutions) {
            const panel = document.getElementById('solutionPanel');
            const content = document.getElementById('solutionContent');

            let html = `<p><strong>${title}</strong></p><ul>`;
            solutions.forEach(solution => {
                html += `<li>${solution}</li>`;
            });
            html += `</ul>`;

            // Добавляем типовые решения
            html += `<br><h5>🔧 Типовые решения:</h5>`;
            html += `<div class="code-block">-- В Supabase SQL Editor выполните:

-- 1. Включить RLS для всех таблиц
ALTER TABLE tarot_user_profiles ENABLE ROW LEVEL SECURITY;
ALTER TABLE tarot_daily_cards ENABLE ROW LEVEL SECURITY;
ALTER TABLE tarot_questions ENABLE ROW LEVEL SECURITY;
ALTER TABLE tarot_answers ENABLE ROW LEVEL SECURITY;
ALTER TABLE tarot_reviews ENABLE ROW LEVEL SECURITY;

-- 2. Создать политики для анонимного доступа
CREATE POLICY "Allow anonymous access to tarot_user_profiles" ON tarot_user_profiles
  FOR ALL TO anon USING (true) WITH CHECK (true);

CREATE POLICY "Allow anonymous access to tarot_daily_cards" ON tarot_daily_cards
  FOR ALL TO anon USING (true) WITH CHECK (true);

CREATE POLICY "Allow anonymous access to tarot_questions" ON tarot_questions
  FOR ALL TO anon USING (true) WITH CHECK (true);

CREATE POLICY "Allow anonymous access to tarot_answers" ON tarot_answers
  FOR ALL TO anon USING (true) WITH CHECK (true);

CREATE POLICY "Allow anonymous access to tarot_reviews" ON tarot_reviews
  FOR ALL TO anon USING (true) WITH CHECK (true);</div>`;

            content.innerHTML = html;
            panel.classList.remove('hidden');
        }

        // Обработчики событий
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('testConnection').addEventListener('click', testConnection);
            document.getElementById('checkTables').addEventListener('click', checkTables);
            document.getElementById('testInsert').addEventListener('click', testInsert);
            document.getElementById('checkRLS').addEventListener('click', checkRLS);
            document.getElementById('runFullDiagnostic').addEventListener('click', runFullDiagnostic);
            
            document.getElementById('clearLogs').addEventListener('click', () => {
                document.getElementById('logContainer').innerHTML = '';
                document.getElementById('solutionPanel').classList.add('hidden');
                logger.info('Логи очищены');
            });

            // Обновляем статус при изменении полей
            document.getElementById('supabaseKey').addEventListener('input', updateStatus);
            
            updateStatus();
            logger.info('Диагностика готова к работе');
        });

        // Экспорт для консоли
        window.SupabaseDiagnostic = {
            testConnection,
            checkTables,
            testInsert,
            checkRLS,
            runFullDiagnostic,
            supabaseClient: () => supabaseClient
        };
    </script>
</body>
</html>
